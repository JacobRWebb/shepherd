version: 2
project_name: shepherd

before:
  hooks:
    - go mod tidy

builds:
  - id: shepherd
    main: ./cmd/shepherd
    binary: shepherd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/JacobRWebb/shepherd/internal/cli.version={{ .Version }}
      - -X github.com/JacobRWebb/shepherd/internal/cli.commit={{ .Commit }}
      - -X github.com/JacobRWebb/shepherd/internal/cli.date={{ .Date }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - AGENTS.md

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 2
    - title: Other changes
      order: 999
  filters:
    exclude:
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
